<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a1a1a" />
  <title>Домой</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%23382712'/><rect x='1' y='1' width='14' height='14' fill='%236b4c2a'/><rect x='2' y='2' width='12' height='12' fill='%23382712'/><rect x='6' y='3' width='4' height='4' fill='%23ff3333'/><rect x='6' y='9' width='4' height='4' fill='%23eeeeee'/><rect x='3' y='6' width='4' height='4' fill='%23eeeeee'/><rect x='9' y='6' width='4' height='4' fill='%23eeeeee'/><rect x='7' y='7' width='2' height='2' fill='%23aaaaaa'/></svg>">
  <style>
    @font-face {
      font-family: 'Minecraft';
      src: url('https://fonts.gstatic.com/s/pressstart2p/v15/e3t4euO8T-267oIAQAu6jDQyK0nR.woff2') format('woff2');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }

    html, body {
      height: 100%;
      background: #1a1a1a;
      color: #e8e4dc;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      touch-action: none;
    }

    /* Pixelated sky/dirt background */
    body {
      background-color: #1a1a1a;
      background-image:
        linear-gradient(rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.7) 100%),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 31px,
          rgba(0,0,0,0.3) 31px,
          rgba(0,0,0,0.3) 32px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 31px,
          rgba(0,0,0,0.3) 31px,
          rgba(0,0,0,0.3) 32px
        );
      background-size: 32px 32px;
    }

    .app {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 48px 24px 36px;
      position: relative;
    }

    /* TOP LABEL */
    .top-label {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: #aaaaaa;
      text-transform: uppercase;
      text-shadow: 2px 2px 0 #000;
    }

    /* COMPASS WRAP */
    .compass-outer {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Minecraft wooden frame — pixel border */
    .mc-frame {
      position: absolute;
      width: 290px;
      height: 290px;
      background: transparent;
    }

    /* Pixel border using box-shadow trick */
    .mc-frame::before {
      content: '';
      position: absolute;
      inset: 0;
      border: 8px solid #6b4c2a;
      box-shadow:
        0 0 0 4px #382712,
        0 0 0 8px #8b6914,
        inset 0 0 0 4px #382712;
    }

    /* The compass circle */
    .compass {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, #2a2a2a 0%, #1a1a1a 80%);
      border: 4px solid #555;
      box-shadow:
        0 0 0 2px #000,
        inset 0 0 0 2px #333,
        0 4px 20px rgba(0,0,0,0.8);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Pixel grid overlay on compass */
    .compass::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 15px, rgba(255,255,255,0.03) 15px, rgba(255,255,255,0.03) 16px),
        repeating-linear-gradient(90deg, transparent, transparent 15px, rgba(255,255,255,0.03) 15px, rgba(255,255,255,0.03) 16px);
      pointer-events: none;
    }

    /* Cardinal directions — Minecraft style pixel text */
    .cardinal {
      position: absolute;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 2px 2px 0 #000, -1px -1px 0 #000;
      pointer-events: none;
      letter-spacing: 0;
    }
    .cardinal.N { top: 14px; left: 50%; transform: translateX(-50%); color: #ff3333; text-shadow: 2px 2px 0 #660000, -1px -1px 0 #000; }
    .cardinal.S { bottom: 14px; left: 50%; transform: translateX(-50%); }
    .cardinal.E { right: 14px; top: 50%; transform: translateY(-50%); }
    .cardinal.W { left: 14px; top: 50%; transform: translateY(-50%); }

    /* Tick marks — pixelated */
    .ticks { position: absolute; width: 260px; height: 260px; pointer-events: none; }

    /* Needle wrap */
    .needle-wrap {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Minecraft compass needle — pixel style */
    .needle {
      position: relative;
      width: 20px;
      height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .needle-north {
      flex: 1;
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-bottom: 100px solid #ff3333;
      filter: drop-shadow(0 0 4px rgba(255,0,0,0.6));
    }

    .needle-south {
      flex: 1;
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 100px solid #eeeeee;
      filter: drop-shadow(0 0 2px rgba(200,200,200,0.4));
    }

    /* Center pixel */
    .center-dot {
      position: absolute;
      width: 12px;
      height: 12px;
      background: #aaaaaa;
      border: 2px solid #000;
      z-index: 10;
    }

    /* Locked state */
    .compass.locked {
      box-shadow:
        0 0 0 2px #000,
        inset 0 0 0 2px #333,
        0 0 30px rgba(255, 200, 0, 0.4),
        0 4px 20px rgba(0,0,0,0.8);
    }

    /* DISTANCE — Minecraft inventory style box */
    .distance-wrap {
      text-align: center;
    }

    .mc-box {
      display: inline-block;
      background: #1a1a1a;
      border: 3px solid #555;
      box-shadow: inset 2px 2px 0 #000, 2px 2px 0 #888;
      padding: 12px 28px;
      position: relative;
    }

    .mc-box::before {
      content: '';
      position: absolute;
      inset: 2px;
      border: 1px solid #333;
      pointer-events: none;
    }

    .distance-value {
      font-family: 'Courier New', monospace;
      font-size: 56px;
      font-weight: bold;
      line-height: 1;
      color: #ffffff;
      text-shadow: 3px 3px 0 #555;
      letter-spacing: -2px;
    }

    .distance-unit {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: #aaaaaa;
      margin-top: 4px;
      text-shadow: 1px 1px 0 #000;
    }

    .distance-label {
      font-size: 11px;
      color: #ffcc00;
      margin-top: 6px;
      text-shadow: 2px 2px 0 #664400;
      letter-spacing: 0.1em;
    }

    /* STATUS BAR — like Minecraft hotbar */
    .status-bar {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .status-slot {
      background: #1a1a1a;
      border: 3px solid #555;
      box-shadow: inset 2px 2px 0 #000, 2px 2px 0 #888;
      padding: 8px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      min-width: 80px;
    }

    .status-val {
      font-size: 13px;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 2px 2px 0 #000;
    }

    .status-key {
      font-size: 8px;
      letter-spacing: 0.15em;
      color: #aaaaaa;
      text-transform: uppercase;
      text-shadow: 1px 1px 0 #000;
    }

    /* OVERLAY */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px;
      text-align: center;
    }

    .mc-title {
      font-family: 'Courier New', monospace;
      font-size: 24px;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 3px 3px 0 #555;
      letter-spacing: 0.05em;
      line-height: 1.3;
    }

    .mc-subtitle {
      font-size: 12px;
      line-height: 1.8;
      color: #aaaaaa;
      max-width: 280px;
      text-shadow: 1px 1px 0 #000;
    }

    /* Minecraft button */
    .mc-btn {
      margin-top: 8px;
      padding: 12px 32px;
      background: #555555;
      border: none;
      border-top: 3px solid #888888;
      border-left: 3px solid #888888;
      border-bottom: 3px solid #222222;
      border-right: 3px solid #222222;
      color: #ffffff;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.1em;
      cursor: pointer;
      text-shadow: 2px 2px 0 #000;
      active: background #666;
    }

    .mc-btn:active {
      background: #666666;
      border-top: 3px solid #222222;
      border-left: 3px solid #222222;
      border-bottom: 3px solid #888888;
      border-right: 3px solid #888888;
    }

    .error-msg {
      color: #ff3333;
      font-size: 11px;
      line-height: 1.7;
      max-width: 280px;
      text-shadow: 1px 1px 0 #000;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="overlay" id="overlay">
  <div style="font-size:52px;margin-bottom:4px">🧭</div>
  <div class="mc-title">КОМПАС ДОМОЙ</div>
  <div class="mc-subtitle">Стрелка укажет точное направление к твоей квартире, куда бы ты ни пошёл</div>
  <button class="mc-btn" id="startBtn">[ ЗАПУСТИТЬ ]</button>
  <div class="error-msg hidden" id="errorMsg"></div>
</div>

<div class="app hidden" id="mainApp">
  <div class="top-label">// навигация · домой //</div>

  <div class="compass-outer">
    <div class="mc-frame"></div>
    <div class="compass" id="compass">
      <div class="ticks" id="ticks"></div>
      <span class="cardinal N">С</span>
      <span class="cardinal S">Ю</span>
      <span class="cardinal E">В</span>
      <span class="cardinal W">З</span>
      <div class="needle-wrap" id="needleWrap">
        <div class="needle">
          <div class="needle-north"></div>
          <div class="needle-south"></div>
        </div>
      </div>
      <div class="center-dot"></div>
    </div>
  </div>

  <div class="distance-wrap">
    <div class="mc-box">
      <div class="distance-value" id="distVal">—</div>
      <div class="distance-unit" id="distUnit">МЕТРОВ ДО ДОМА</div>
    </div>
    <div class="distance-label" id="distLabel">ожидание сигнала...</div>
  </div>

  <div class="status-bar">
    <div class="status-slot">
      <span class="status-val" id="latVal">—</span>
      <span class="status-key">широта</span>
    </div>
    <div class="status-slot">
      <span class="status-val" id="lngVal">—</span>
      <span class="status-key">долгота</span>
    </div>
    <div class="status-slot">
      <span class="status-val" id="bearVal">—°</span>
      <span class="status-key">курс</span>
    </div>
  </div>
</div>

<script>
  const HOME_LAT=54.5193,HOME_LNG=36.2730;
  let targetBearing=0,currentHeading=0,smoothAngle=0,hasLocation=false;

  // Pixel tick marks
  const ticksEl=document.getElementById('ticks');
  for(let i=0;i<36;i++){
    const t=document.createElement('div'),major=i%9===0;
    t.style.cssText=`position:absolute;left:50%;top:50%;width:${major?4:2}px;height:${major?16:8}px;background:${major?'#ffffff':'#666666'};opacity:${major?0.8:0.5};transform-origin:0 -130px;transform:rotate(${i*10}deg) translateX(-50%);`;
    ticksEl.appendChild(t);
  }

  function haversine(a,b,c,d){const R=6371000,dL=(c-a)*Math.PI/180,dl=(d-b)*Math.PI/180,e=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dl/2)**2;return R*2*Math.atan2(Math.sqrt(e),Math.sqrt(1-e));}
  function calcBearing(a,b,c,d){const p1=a*Math.PI/180,p2=c*Math.PI/180,dl=(d-b)*Math.PI/180,y=Math.sin(dl)*Math.cos(p2),x=Math.cos(p1)*Math.sin(p2)-Math.sin(p1)*Math.cos(p2)*Math.cos(dl);return(Math.atan2(y,x)*180/Math.PI+360)%360;}

  function animate(){
    if(hasLocation){const raw=targetBearing-currentHeading,delta=((raw-smoothAngle+540)%360)-180;smoothAngle=(smoothAngle+delta*0.12+360)%360;document.getElementById('needleWrap').style.transform=`rotate(${smoothAngle}deg)`;}
    requestAnimationFrame(animate);
  }

  function startLocation(){
    navigator.geolocation.watchPosition(pos=>{
      const{latitude:lat,longitude:lng,accuracy:acc}=pos.coords;
      hasLocation=true;
      const dist=haversine(lat,lng,HOME_LAT,HOME_LNG);
      targetBearing=calcBearing(lat,lng,HOME_LAT,HOME_LNG);
      document.getElementById('distVal').textContent=dist<1000?Math.round(dist):(dist/1000).toFixed(1);
      document.getElementById('distUnit').textContent=dist<1000?'МЕТРОВ ДО ДОМА':'КМ ДО ДОМА';
      document.getElementById('distLabel').textContent=dist<30?'🏠 ТЫ ДОМА!':`точность ±${Math.round(acc)}м`;
      document.getElementById('latVal').textContent=lat.toFixed(4);
      document.getElementById('lngVal').textContent=lng.toFixed(4);
      document.getElementById('bearVal').textContent=Math.round(targetBearing)+'°';
      if(dist<30)document.getElementById('compass').classList.add('locked');
    },err=>{showError(err.code===1?'Геолокация запрещена.':'Ошибка: '+err.message);},{enableHighAccuracy:true,maximumAge:1000});
  }

  function startOrientation(){
    const listen=()=>{window.addEventListener('deviceorientationabsolute',onOrient,true);window.addEventListener('deviceorientation',onOrient,true);};
    typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'?DeviceOrientationEvent.requestPermission().then(s=>{if(s==='granted')listen();}).catch(()=>{}):listen();
  }

  function onOrient(e){if(e.webkitCompassHeading!=null)currentHeading=e.webkitCompassHeading;else if(e.alpha!=null)currentHeading=(360-e.alpha)%360;}
  function showError(msg){const el=document.getElementById('errorMsg');el.textContent=msg;el.classList.remove('hidden');}

  document.getElementById('startBtn').addEventListener('click',()=>{
    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
    startLocation();startOrientation();requestAnimationFrame(animate);
  });
</script>
</body>
</html>
